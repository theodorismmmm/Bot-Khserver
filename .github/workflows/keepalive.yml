name: Keep Render App Awake

on:
  schedule:
    - cron: '*/12 * * * *'
  workflow_dispatch:

permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Open bot-khserver URL
        run: |
          status_code=$(curl -sS --retry 3 --retry-delay 5 --max-time 30 -o /dev/null -w "%{http_code}" https://bot-khserver.onrender.com/)
          echo "Ping HTTP status: ${status_code}"
          if [ "${status_code}" -ge 400 ]; then
            echo "Ping failed with HTTP status ${status_code}" >&2
            exit 1
          fi
